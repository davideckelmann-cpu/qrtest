<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR Check-in Web-App</title>
  <style>
    :root {
      --bg: #f7f7f8;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --border: #e5e7eb;
      --border-strong: #d5d7da;
      --primary: #111827;
      --success-bg: #ecfdf3;
      --warning-bg: #fffaeb;
      --error-bg: #fef3f2;
      --shadow: 0 1px 2px rgba(16, 24, 40, 0.04);
      --radius-xl: 24px;
      --radius-lg: 18px;
      --radius-md: 14px;
      --max-width: 1280px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .app {
      min-height: 100vh;
      padding: 24px;
    }

    .container {
      max-width: var(--max-width);
      margin: 0 auto;
      display: grid;
      gap: 24px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
    }

    .card-body { padding: 24px; }
    .card-body-sm { padding: 20px; }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--border-strong);
      border-radius: 999px;
      padding: 8px 12px;
      color: var(--muted);
      font-size: 14px;
      background: #fff;
    }

    h1 {
      margin: 16px 0 0;
      font-size: clamp(34px, 5vw, 48px);
      line-height: 1.05;
      letter-spacing: -0.04em;
    }

    h2 {
      margin: 0;
      font-size: 22px;
      letter-spacing: -0.02em;
    }

    p.lead {
      margin: 16px 0 0;
      max-width: 860px;
      font-size: 18px;
      line-height: 1.7;
      color: var(--muted);
    }

    .muted { color: var(--muted); }
    .small { font-size: 14px; }
    .mono {
      margin-top: 8px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 12px;
      color: var(--muted);
      word-break: break-word;
    }

    .row, .row-between {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    .row-between { justify-content: space-between; }

    .btn {
      border: 1px solid var(--primary);
      background: var(--primary);
      color: #fff;
      border-radius: var(--radius-md);
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn.secondary {
      border-color: var(--border-strong);
      background: #fff;
      color: var(--text);
    }

    .btn:disabled {
      background: #f3f4f6;
      color: #9ca3af;
      border-color: #e5e7eb;
      cursor: not-allowed;
    }

    .segmented {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .segmented button,
    .tabs button {
      border: 1px solid var(--border-strong);
      background: #fff;
      color: var(--text);
      border-radius: var(--radius-md);
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .segmented button.active,
    .tabs button.active {
      border-color: var(--primary);
      background: var(--primary);
      color: #fff;
    }

    .grid-header-admin,
    .grid-header-participant {
      display: grid;
      gap: 24px;
      align-items: end;
    }

    .grid-header-admin { grid-template-columns: minmax(0, 1.3fr) minmax(300px, 0.7fr); }
    .grid-header-participant { grid-template-columns: minmax(0, 1.1fr) minmax(300px, 0.9fr); }

    .stats-grid,
    .info-grid,
    .steps-grid,
    .two-col-grid {
      display: grid;
      gap: 16px;
    }

    .stats-grid { grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
    .info-grid { grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
    .steps-grid { grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; }
    .two-col-grid { grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 24px; }

    .stat-card-head {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
    }

    .stat-value {
      margin-top: 8px;
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.03em;
    }

    .icon-box {
      width: 38px;
      height: 38px;
      border-radius: 14px;
      border: 1px solid #d6d6d6;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      background: #fff;
    }

    .progress-track {
      width: 100%;
      height: 12px;
      background: #eceff3;
      border-radius: 999px;
      overflow: hidden;
      margin-top: 10px;
    }

    .progress-fill {
      height: 100%;
      background: var(--primary);
      border-radius: 999px;
    }

    .box {
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 16px;
      background: #fff;
    }

    .box-lg {
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 20px;
      background: #fff;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 600;
      border: 1px solid var(--primary);
      background: var(--primary);
      color: #fff;
    }

    .badge.outline {
      background: #fff;
      color: var(--text);
      border-color: #d1d5db;
    }

    .badge.secondary {
      background: #f3f4f6;
      color: var(--text);
      border-color: #e5e7eb;
    }

    .feedback {
      margin-top: 16px;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 16px;
      font-size: 14px;
    }

    .feedback.success { background: var(--success-bg); }
    .feedback.warning { background: var(--warning-bg); }
    .feedback.error { background: var(--error-bg); }

    input[type="text"],
    input[type="search"] {
      width: 100%;
      border: 1px solid var(--border-strong);
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 14px;
      outline: none;
      background: #fff;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 900px;
    }

    th {
      text-align: left;
      padding: 14px 16px;
      font-size: 13px;
      color: var(--muted);
      font-weight: 600;
      background: #fafafa;
    }

    td {
      padding: 16px;
      vertical-align: top;
      font-size: 14px;
      border-top: 1px solid #f0f0f0;
    }

    .table-wrap {
      margin-top: 20px;
      overflow-x: auto;
      border: 1px solid var(--border);
      border-radius: 20px;
    }

    .option-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 14px;
    }

    .steps-grid .step {
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      border-radius: 18px;
      padding: 14px;
      font-size: 14px;
      font-weight: 600;
    }

    .steps-grid .step.current {
      border-color: var(--primary);
      background: var(--primary);
      color: #fff;
    }

    .steps-grid .step.done { background: #f3f4f6; }

    @media (max-width: 960px) {
      .grid-header-admin,
      .grid-header-participant {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="container">
      <div id="role-switch" class="segmented"></div>
      <div id="app-root"></div>
    </div>
  </div>

  <script>
    const forumOptions = [
      { id: "forum-1", title: "Fachforum 1 · Digitale Bildung" },
      { id: "forum-2", title: "Fachforum 2 · Führung und Organisation" },
      { id: "forum-3", title: "Fachforum 3 · Gesundheit und Arbeit" },
      { id: "forum-4", title: "Fachforum 4 · KI und Verwaltung" },
    ];

    const programOptions = [
      { id: "prog-1", title: "Abendempfang" },
      { id: "prog-2", title: "Stadtführung" },
      { id: "prog-3", title: "Netzwerk-Dinner" },
      { id: "prog-4", title: "Kulturprogramm" },
      { id: "prog-5", title: "Abschlussrunde" },
    ];

    const mealOptions = ["fleisch", "vegetarisch", "vegan"];

    const state = {
      role: "admin",
      adminTab: "dashboard",
      participantMode: "pre_event",
      participantStep: "identify",
      participantLookup: "",
      participantCurrentId: null,
      participantMessage: null,
      participantSearch: "",
      participants: [
        {
          id: "p1",
          referenceNumber: "BZ-2026-001",
          name: "Max Mustermann",
          email: "max@example.org",
          organization: "Beispiel GmbH",
          status: "checked_in",
          checkedInAt: "08:54",
          mealPreference: "vegetarisch",
          lunchPackage: true,
          selectedForumId: "forum-1",
          selectedProgramIds: ["prog-1", "prog-3"],
        },
        {
          id: "p2",
          referenceNumber: "BZ-2026-002",
          name: "Sofia Becker",
          email: "sofia@example.org",
          organization: "KBW",
          status: "pending",
          checkedInAt: null,
          mealPreference: "vegan",
          lunchPackage: false,
          selectedForumId: "forum-2",
          selectedProgramIds: ["prog-2"],
        },
        {
          id: "p3",
          referenceNumber: "BZ-2026-003",
          name: "Daniel Yilmaz",
          email: "daniel@example.org",
          organization: "Senatsverwaltung",
          status: "pending",
          checkedInAt: null,
          mealPreference: "fleisch",
          lunchPackage: true,
          selectedForumId: null,
          selectedProgramIds: [],
        },
        {
          id: "p4",
          referenceNumber: "BZ-2026-004",
          name: "Laura König",
          email: "laura@example.org",
          organization: "Bildungspartner",
          status: "checked_in",
          checkedInAt: "09:07",
          mealPreference: "vegetarisch",
          lunchPackage: false,
          selectedForumId: "forum-4",
          selectedProgramIds: ["prog-4", "prog-5"],
        },
        {
          id: "p5",
          referenceNumber: "BZ-2026-005",
          name: "Nina Hartmann",
          email: "nina@example.org",
          organization: "KBW",
          status: "pending",
          checkedInAt: null,
          mealPreference: "vegan",
          lunchPackage: false,
          selectedForumId: "forum-3",
          selectedProgramIds: ["prog-1"],
        },
      ],
    };

    function formatNowTime() {
      return new Date().toLocaleTimeString("de-DE", { hour: "2-digit", minute: "2-digit" });
    }

    function calculateStats(participants) {
      const total = participants.length;
      const checkedIn = participants.filter((p) => p.status === "checked_in").length;
      const pending = Math.max(total - checkedIn, 0);
      const percent = total ? Math.round((checkedIn / total) * 100) : 0;
      const lunchPackages = participants.filter((p) => p.lunchPackage).length;
      const forumSelections = participants.filter((p) => p.selectedForumId).length;
      const programSelections = participants.reduce((sum, p) => sum + p.selectedProgramIds.length, 0);
      return { total, checkedIn, pending, percent, lunchPackages, forumSelections, programSelections };
    }

    function searchParticipants(participants, query) {
      const q = query.trim().toLowerCase();
      if (!q) return participants;
      return participants.filter((p) =>
        [p.name, p.email, p.organization, p.referenceNumber].some((value) =>
          String(value || "").toLowerCase().includes(q)
        )
      );
    }

    function findParticipantByReference(participants, input) {
      const normalized = input.trim().toLowerCase();
      if (!normalized) return null;
      return (
        participants.find((p) => p.referenceNumber.toLowerCase() === normalized) ||
        participants.find((p) => p.name.toLowerCase().includes(normalized)) ||
        null
      );
    }

    function getParticipantById(id) {
      return state.participants.find((p) => p.id === id) || null;
    }

    function updateParticipant(id, updater) {
      state.participants = state.participants.map((p) => (p.id === id ? updater({ ...p }) : p));
    }

    function getForumLabel(forumId) {
      const forum = forumOptions.find((item) => item.id === forumId);
      return forum ? forum.title : "Nicht ausgewählt";
    }

    function getProgramLabels(programIds) {
      return programOptions.filter((item) => programIds.includes(item.id)).map((item) => item.title);
    }

    function statusBadge(status) {
      if (status === "checked_in") return '<span class="badge">Eingecheckt</span>';
      if (status === "duplicate") return '<span class="badge secondary">Doppelter Versuch</span>';
      return '<span class="badge outline">Offen</span>';
    }

    function feedbackBox(message) {
      if (!message) return "";
      return `<div class="feedback ${message.type}">${escapeHtml(message.text)}</div>`;
    }

    function statCard(title, value, icon, subline) {
      return `
        <div class="card">
          <div class="card-body-sm">
            <div class="stat-card-head">
              <div>
                <div class="small muted">${title}</div>
                <div class="stat-value">${value}</div>
                <div class="small muted" style="margin-top: 8px; line-height: 1.5;">${subline}</div>
              </div>
              <div class="icon-box">${icon}</div>
            </div>
          </div>
        </div>
      `;
    }

    function apiCard(title, endpoint) {
      return `<div class="box"><div style="font-weight:600;">${title}</div><div class="mono">${escapeHtml(endpoint)}</div></div>`;
    }

    function sectionHeader(eyebrow, title, text) {
      return `
        <div>
          ${eyebrow ? `<div class="pill"><span>${eyebrow}</span></div>` : ""}
          <h1>${title}</h1>
          <p class="lead">${text}</p>
        </div>
      `;
    }

    function renderRoleSwitch() {
      const root = document.getElementById("role-switch");
      root.innerHTML = `
        <button class="${state.role === "admin" ? "active" : ""}" data-role="admin">Admin-Ansicht</button>
        <button class="${state.role === "participant" ? "active" : ""}" data-role="participant">Teilnehmendenansicht</button>
      `;
      root.querySelectorAll("button").forEach((btn) => {
        btn.addEventListener("click", () => {
          state.role = btn.dataset.role;
          render();
        });
      });
    }

    function renderAdminApp() {
      const stats = calculateStats(state.participants);
      const tabs = [
        { id: "dashboard", label: "Dashboard" },
        { id: "participants", label: "Teilnehmer" },
        { id: "diagnostics", label: "Diagnose" },
      ];

      return `
        <div style="display:grid; gap:24px;">
          <div class="grid-header-admin">
            ${sectionHeader("🔳 Admin-Portal", "Steuerung und Übersicht für Veranstaltungsorganisation", "Verwalten Sie Teilnehmende, Check-ins, Fachforen, Programmpunkte und Verpflegungswünsche zentral in einer Oberfläche.")}
            <div class="card">
              <div class="card-body-sm">
                <div class="small muted">Live-Status ATagung 2026</div>
                <div class="stat-value">${stats.checkedIn} / ${stats.total}</div>
                <div class="progress-track"><div class="progress-fill" style="width:${stats.percent}%;"></div></div>
                <div class="row" style="margin-top:16px;">
                  <button class="btn" type="button">Export</button>
                  <button class="btn secondary" type="button">QR-Links erzeugen</button>
                </div>
              </div>
            </div>
          </div>
          <div class="tabs segmented">
            ${tabs.map((tab) => `<button class="${state.adminTab === tab.id ? "active" : ""}" data-admin-tab="${tab.id}">${tab.label}</button>`).join("")}
          </div>
          ${state.adminTab === "dashboard" ? renderDashboardTab() : ""}
          ${state.adminTab === "participants" ? renderParticipantsTab() : ""}
          ${state.adminTab === "diagnostics" ? renderDiagnosticsTab() : ""}
        </div>
      `;
    }

    function renderDashboardTab() {
      const { total, checkedIn, pending, percent, lunchPackages, forumSelections, programSelections } = calculateStats(state.participants);
      return `
        <div style="display:grid; gap:24px;">
          <div class="stats-grid">
            ${statCard("Teilnehmende gesamt", total, "👥", "Importierte Datensätze für das Event")}
            ${statCard("Bereits eingecheckt", checkedIn, "✅", "Live-Status am Einlass")}
            ${statCard("Noch offen", pending, "🔳", "Noch nicht bestätigte Teilnahmen")}
            ${statCard("Lunchpakete", lunchPackages, "🥪", "Aktuelle Auswahl der Teilnehmenden")}
            ${statCard("Fachforen", forumSelections, "🧩", "Verbindlich gewählte Foren")}
            ${statCard("Programmpunkte", programSelections, "📅", "Gebuchte Punkte im Rahmenprogramm")}
          </div>
          <div class="card">
            <div class="card-body">
              <h2>Check-in-Fortschritt</h2>
              <div class="row-between small" style="margin-top:20px;">
                <span class="muted">Verbindlich erfasste Anwesenheiten</span>
                <span style="font-weight:600;">${percent}%</span>
              </div>
              <div class="progress-track"><div class="progress-fill" style="width:${percent}%;"></div></div>
              <div class="info-grid" style="margin-top:20px;">
                <div class="box"><div class="small muted">Self-Service</div><div style="margin-top:8px; font-weight:600;">Änderungen per Bezugsnummer oder Token</div></div>
                <div class="box"><div class="small muted">Verpflegung</div><div style="margin-top:8px; font-weight:600;">Fleisch, vegetarisch, vegan und Lunchpaket</div></div>
                <div class="box"><div class="small muted">Buchungslogik</div><div style="margin-top:8px; font-weight:600;">1 Fachforum, bis zu 5 Programmpunkte</div></div>
                <div class="box"><div class="small muted">Export</div><div style="margin-top:8px; font-weight:600;">CSV / XLSX / PDF Anwesenheitsliste</div></div>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function renderParticipantsTab() {
      const filtered = searchParticipants(state.participants, state.participantSearch);
      return `
        <div class="card">
          <div class="card-body">
            <div class="row-between" style="align-items:center; gap:16px;">
              <div>
                <h2>Teilnehmerliste</h2>
                <div class="small muted" style="margin-top:6px;">Suche, Statusprüfung und manueller Fallback am Einlass</div>
              </div>
              <div style="min-width:280px; flex:1 1 320px; max-width:360px;">
                <input id="participant-search" type="search" value="${escapeAttribute(state.participantSearch)}" placeholder="Name, E-Mail, Organisation oder Bezugsnummer" />
              </div>
            </div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>Bezugsnummer</th>
                    <th>Name</th>
                    <th>Organisation</th>
                    <th>Verpflegung</th>
                    <th>Status</th>
                    <th>Zeit</th>
                    <th style="text-align:right;">Aktion</th>
                  </tr>
                </thead>
                <tbody>
                  ${filtered.map((participant) => `
                    <tr>
                      <td><div style="font-weight:600;">${participant.referenceNumber}</div></td>
                      <td><div style="font-weight:600;">${participant.name}</div><div class="small muted" style="margin-top:4px;">${participant.email}</div></td>
                      <td>${participant.organization}</td>
                      <td>${participant.mealPreference}${participant.lunchPackage ? " · Lunchpaket" : ""}</td>
                      <td>${statusBadge(participant.status)}</td>
                      <td>${participant.checkedInAt || "—"}</td>
                      <td style="text-align:right;"><button class="btn secondary manual-checkin" data-id="${participant.id}" ${participant.status === "checked_in" ? "disabled" : ""}>${participant.status === "checked_in" ? "Erfasst" : "Manuell einchecken"}</button></td>
                    </tr>
                  `).join("")}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      `;
    }

    function renderDiagnosticsTab() {
      const results = runDiagnostics();
      const passed = results.filter((item) => item.ok).length;
      return `
        <div class="card">
          <div class="card-body">
            <h2>Diagnose</h2>
            <div class="small muted" style="margin-top:6px;">Kleine Laufzeitprüfungen für Statistik- und Suchlogik</div>
            <div class="small" style="margin-top:16px; font-weight:600;">${passed} / ${results.length} Checks erfolgreich</div>
            <div style="display:grid; gap:10px; margin-top:16px;">
              ${results.map((result) => `<div class="box" style="display:flex; justify-content:space-between; gap:16px; background:${result.ok ? "#ecfdf3" : "#fef3f2"};"><span>${result.name}</span><strong>${result.ok ? "OK" : "Fehler"}</strong></div>`).join("")}
            </div>
          </div>
        </div>
      `;
    }

    function renderParticipantApp() {
      const { checkedIn, total } = calculateStats(state.participants);
      const steps = state.participantMode === "pre_event"
        ? [
            { id: "identify", label: "1. Identifikation" },
            { id: "selection", label: "2. Auswahl vorab" },
            { id: "pre_event_done", label: "3. Bestätigung" },
          ]
        : [
            { id: "identify", label: "1. Identifikation" },
            { id: "checkin", label: "2. Check-in" },
            { id: "confirmation", label: "3. Bestätigung" },
          ];

      const currentParticipant = getParticipantById(state.participantCurrentId);

      return `
        <div style="display:grid; gap:24px;">
          <div class="grid-header-participant">
            ${sectionHeader(
              "🎟️ Teilnehmendenportal",
              state.participantMode === "pre_event" ? "Vorab-Auswahl für Fachforen, Programm und Verpflegung" : "Schneller Check-in am Veranstaltungstag",
              state.participantMode === "pre_event"
                ? "Sechs Wochen vor der Tagung wählen Teilnehmende ihr Fachforum, Rahmenprogramm und ihre Verpflegung. Der Check-in erfolgt erst separat am Veranstaltungstag."
                : "Am Veranstaltungstag bestätigen Teilnehmende nur noch ihre Anwesenheit. Bereits gespeicherte Vorabauswahlen bleiben dabei erhalten."
            )}
            <div class="card">
              <div class="card-body-sm">
                <div class="small muted">Portalstatus</div>
                <div class="stat-value">${state.participantMode === "pre_event" ? "Vorab offen" : "Check-in offen"}</div>
                <div class="small muted" style="margin-top:8px; line-height:1.6;">Bereits ${checkedIn} von ${total} Teilnehmenden haben ihre Anwesenheit bestätigt.</div>
                <div style="display:grid; gap:10px; margin-top:16px;">
                  ${apiCard("Vorab-Portal", "Fachforum, Programm, Verpflegung")}
                  ${apiCard("Eventtag", "Separater Check-in mit Bezugsnummer oder Token")}
                </div>
              </div>
            </div>
          </div>

          <div class="segmented">
            <button class="${state.participantMode === "pre_event" ? "active" : ""}" data-mode="pre_event">Vorab-Auswahl</button>
            <button class="${state.participantMode === "event_day" ? "active" : ""}" data-mode="event_day">Event-Check-in</button>
          </div>

          <div class="card">
            <div class="card-body">
              <div class="small muted">Schritte</div>
              <div class="steps-grid" style="margin-top:12px;">
                ${steps.map((item, index) => {
                  const currentIndex = steps.findIndex((stepItem) => stepItem.id === state.participantStep);
                  const classes = ["step"];
                  if (item.id === state.participantStep) classes.push("current");
                  else if (index < currentIndex) classes.push("done");
                  return `<div class="${classes.join(" ")}">${item.label}</div>`;
                }).join("")}
              </div>
            </div>
          </div>

          ${renderParticipantStep(currentParticipant)}
        </div>
      `;
    }

    function renderParticipantStep(currentParticipant) {
      if (state.participantStep === "identify") {
        return `
          <div class="card">
            <div class="card-body">
              <h2>${state.participantMode === "pre_event" ? "1. Identifikation für Vorabauswahl" : "1. Identifikation für Check-in"}</h2>
              <div class="small muted" style="margin-top:6px;">Bitte geben Sie Ihre Bezugsnummer oder Ihren persönlichen Link ein, um fortzufahren.</div>
              <div class="box" style="margin-top:20px;">
                <div class="small" style="margin-bottom:12px; font-weight:600;">Bezugsnummer oder Token</div>
                <div class="row">
                  <div style="flex:1 1 240px;"><input id="participant-lookup" type="text" value="${escapeAttribute(state.participantLookup)}" placeholder="z. B. BZ-2026-002" /></div>
                  <button class="btn" id="participant-continue">Weiter</button>
                </div>
              </div>
              ${feedbackBox(state.participantMessage)}
            </div>
          </div>
        `;
      }

      if (state.participantStep === "checkin" && currentParticipant) {
        return `
          <div class="card">
            <div class="card-body">
              <h2>2. Check-in</h2>
              <div class="small muted" style="margin-top:6px;">Bitte bestätigen Sie Ihre Anwesenheit für die Tagung.</div>
              <div class="box-lg" style="margin-top:20px;">
                <div class="small muted">Willkommen</div>
                <div style="margin-top:6px; font-size:28px; font-weight:700; letter-spacing:-0.03em;">${currentParticipant.name}</div>
                <div class="small muted" style="margin-top:6px;">${currentParticipant.referenceNumber} · ${currentParticipant.organization}</div>
                <div class="row" style="margin-top:16px;">${statusBadge(currentParticipant.status)}<span class="small muted">ATagung 2026</span></div>
                <div class="row" style="margin-top:20px;">
                  <button class="btn" id="confirm-checkin">Anwesenheit bestätigen</button>
                  <button class="btn secondary" id="restart-flow">Abbrechen</button>
                </div>
              </div>
              ${feedbackBox(state.participantMessage)}
            </div>
          </div>
        `;
      }

      if (state.participantStep === "selection" && currentParticipant) {
        return `
          <div class="two-col-grid">
            <div class="card">
              <div class="card-body">
                <h2>${state.participantMode === "pre_event" ? "2. Auswahl vorab" : "Auswahl"}</h2>
                <div class="small muted" style="margin-top:6px;">Wählen Sie Ihr Fachforum, Programmpunkte und Ihre Verpflegung.</div>

                <div class="box-lg" style="margin-top:16px;">
                  <div class="small muted">Teilnehmer</div>
                  <div style="margin-top:6px; font-size:28px; font-weight:700; letter-spacing:-0.03em;">${currentParticipant.name}</div>
                  <div class="small muted" style="margin-top:6px;">${currentParticipant.referenceNumber} · ${currentParticipant.organization}</div>
                </div>

                <div class="box-lg" style="margin-top:16px;">
                  <div style="font-weight:600;">Fachforum</div>
                  <div style="display:grid; gap:10px; margin-top:12px;">
                    ${forumOptions.map((forum) => `
                      <label class="option-row">
                        <input type="radio" name="forum" data-forum-id="${forum.id}" ${currentParticipant.selectedForumId === forum.id ? "checked" : ""} />
                        <span>${forum.title}</span>
                      </label>
                    `).join("")}
                  </div>
                </div>

                <div class="box-lg" style="margin-top:16px;">
                  <div style="font-weight:600;">Rahmenprogramm</div>
                  <div class="small muted" style="margin-top:6px;">Bis zu 5 Programmpunkte auswählbar</div>
                  <div style="display:grid; gap:10px; margin-top:12px;">
                    ${programOptions.map((program) => `
                      <label class="option-row">
                        <input type="checkbox" data-program-id="${program.id}" ${currentParticipant.selectedProgramIds.includes(program.id) ? "checked" : ""} />
                        <span>${program.title}</span>
                      </label>
                    `).join("")}
                  </div>
                </div>

                <div class="box-lg" style="margin-top:16px;">
                  <div style="font-weight:600;">Verpflegung</div>
                  <div style="display:grid; gap:10px; margin-top:12px;">
                    ${mealOptions.map((meal) => `
                      <label class="option-row">
                        <input type="radio" name="mealPreference" data-meal="${meal}" ${currentParticipant.mealPreference === meal ? "checked" : ""} />
                        <span style="text-transform:capitalize;">${meal}</span>
                      </label>
                    `).join("")}
                    <label class="option-row">
                      <input type="checkbox" id="lunch-package" ${currentParticipant.lunchPackage ? "checked" : ""} />
                      <span>Lunchpaket</span>
                    </label>
                  </div>
                </div>

                <div class="row" style="margin-top:16px;">
                  <button class="btn" id="save-selection">Auswahl speichern</button>
                  <button class="btn secondary" id="restart-flow">Abbrechen</button>
                </div>
                ${feedbackBox(state.participantMessage)}
              </div>
            </div>

            <div class="card">
              <div class="card-body">
                <h2>${state.participantMode === "pre_event" ? "Vorab-Zusammenfassung" : "Zwischenstand"}</h2>
                <div class="small muted" style="margin-top:6px;">Überblick über die bisher gewählten Angaben</div>
                <div style="display:grid; gap:14px; margin-top:20px;">
                  ${apiCard("Gewähltes Fachforum", getForumLabel(currentParticipant.selectedForumId))}
                  ${apiCard("Rahmenprogramm", getProgramLabels(currentParticipant.selectedProgramIds).join(", ") || "Keine Auswahl")}
                  ${apiCard("Verpflegung", `${currentParticipant.mealPreference} · Lunchpaket: ${currentParticipant.lunchPackage ? "Ja" : "Nein"}`)}
                  ${apiCard("Check-in-Status", currentParticipant.status === "checked_in" ? `Eingecheckt um ${currentParticipant.checkedInAt}` : "Noch nicht eingecheckt")}
                </div>
              </div>
            </div>
          </div>
        `;
      }

      if (state.participantStep === "pre_event_done" && currentParticipant) {
        return `
          <div class="card">
            <div class="card-body">
              <h2>3. Bestätigung</h2>
              <div class="small muted" style="margin-top:6px;">Ihre Vorabauswahl wurde erfolgreich gespeichert.</div>
              <div class="box-lg" style="margin-top:20px;">
                <div class="small muted">Vielen Dank</div>
                <div style="margin-top:6px; font-size:28px; font-weight:700; letter-spacing:-0.03em;">${currentParticipant.name}</div>
                <div style="display:grid; gap:14px; margin-top:16px;">
                  ${apiCard("Fachforum", getForumLabel(currentParticipant.selectedForumId))}
                  ${apiCard("Rahmenprogramm", getProgramLabels(currentParticipant.selectedProgramIds).join(", ") || "Keine Auswahl")}
                  ${apiCard("Verpflegung", `${currentParticipant.mealPreference} · Lunchpaket: ${currentParticipant.lunchPackage ? "Ja" : "Nein"}`)}
                  ${apiCard("Hinweis", "Der Check-in erfolgt separat am Veranstaltungstag.")}
                </div>
                <div class="row" style="margin-top:20px;">
                  <button class="btn" id="restart-flow">Neuen Vorgang starten</button>
                  <button class="btn secondary" id="back-to-selection">Auswahl nochmals ändern</button>
                </div>
              </div>
              ${feedbackBox(state.participantMessage)}
            </div>
          </div>
        `;
      }

      if (state.participantStep === "confirmation" && currentParticipant) {
        return `
          <div class="card">
            <div class="card-body">
              <h2>3. Bestätigung</h2>
              <div class="small muted" style="margin-top:6px;">Ihre Anwesenheit wurde erfolgreich bestätigt.</div>
              <div class="box-lg" style="margin-top:20px;">
                <div class="small muted">Vielen Dank</div>
                <div style="margin-top:6px; font-size:28px; font-weight:700; letter-spacing:-0.03em;">${currentParticipant.name}</div>
                <div style="display:grid; gap:14px; margin-top:16px;">
                  ${apiCard("Check-in", `Bestätigt um ${currentParticipant.checkedInAt || "—"}`)}
                  ${apiCard("Fachforum", getForumLabel(currentParticipant.selectedForumId))}
                  ${apiCard("Rahmenprogramm", getProgramLabels(currentParticipant.selectedProgramIds).join(", ") || "Keine Auswahl")}
                  ${apiCard("Verpflegung", `${currentParticipant.mealPreference} · Lunchpaket: ${currentParticipant.lunchPackage ? "Ja" : "Nein"}`)}
                </div>
                <div class="row" style="margin-top:20px;">
                  <button class="btn" id="restart-flow">Neuen Vorgang starten</button>
                </div>
              </div>
              ${feedbackBox(state.participantMessage)}
            </div>
          </div>
        `;
      }

      return "";
    }

    function runDiagnostics() {
      const stats = calculateStats(state.participants);
      const results = [];
      results.push({ name: "Stats count total participants", ok: stats.total === 5 });
      results.push({ name: "Stats count checked-in participants", ok: stats.checkedIn === 2 });
      results.push({ name: "Search finds Sofia Becker", ok: searchParticipants(state.participants, "sofia").length === 1 });
      results.push({ name: "Search empty query returns all", ok: searchParticipants(state.participants, "").length === state.participants.length });
      results.push({ name: "Progress percentage is valid", ok: stats.percent >= 0 && stats.percent <= 100 });
      results.push({ name: "Reference search finds participant", ok: findParticipantByReference(state.participants, "BZ-2026-003")?.name === "Daniel Yilmaz" });
      results.push({ name: "Forum label resolves correctly", ok: getForumLabel("forum-2").includes("Fachforum 2") });
      results.push({ name: "Program labels resolve correctly", ok: getProgramLabels(["prog-1", "prog-3"]).length === 2 });
      return results;
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function escapeAttribute(value) {
      return escapeHtml(value);
    }

    function render() {
      renderRoleSwitch();
      const root = document.getElementById("app-root");
      root.innerHTML = state.role === "admin" ? renderAdminApp() : renderParticipantApp();
      attachEvents();
    }

    function attachEvents() {
      document.querySelectorAll("[data-admin-tab]").forEach((btn) => {
        btn.addEventListener("click", () => {
          state.adminTab = btn.dataset.adminTab;
          render();
        });
      });

      const participantSearch = document.getElementById("participant-search");
      if (participantSearch) {
        participantSearch.addEventListener("input", (e) => {
          state.participantSearch = e.target.value;
          render();
        });
      }

      document.querySelectorAll(".manual-checkin").forEach((btn) => {
        btn.addEventListener("click", () => {
          const id = btn.dataset.id;
          updateParticipant(id, (participant) => ({ ...participant, status: "checked_in", checkedInAt: formatNowTime() }));
          render();
        });
      });

      document.querySelectorAll("[data-mode]").forEach((btn) => {
        btn.addEventListener("click", () => {
          state.participantMode = btn.dataset.mode;
          state.participantStep = "identify";
          state.participantLookup = "";
          state.participantCurrentId = null;
          state.participantMessage = null;
          render();
        });
      });

      const participantLookup = document.getElementById("participant-lookup");
      if (participantLookup) {
        participantLookup.addEventListener("input", (e) => {
          state.participantLookup = e.target.value;
        });
      }

      const participantContinue = document.getElementById("participant-continue");
      if (participantContinue) {
        participantContinue.addEventListener("click", () => {
          const match = findParticipantByReference(state.participants, state.participantLookup);
          if (!match) {
            state.participantCurrentId = null;
            state.participantMessage = { type: "error", text: "Keine passende Bezugsnummer oder kein passender Token gefunden." };
            render();
            return;
          }
          state.participantCurrentId = match.id;
          state.participantMessage = null;
          state.participantStep = state.participantMode === "pre_event"
            ? "selection"
            : match.status === "checked_in"
              ? "confirmation"
              : "checkin";
          render();
        });
      }

      const restartButtons = document.querySelectorAll("#restart-flow");
      restartButtons.forEach((btn) => {
        btn.addEventListener("click", () => {
          state.participantLookup = "";
          state.participantCurrentId = null;
          state.participantMessage = null;
          state.participantStep = "identify";
          render();
        });
      });

      const confirmCheckin = document.getElementById("confirm-checkin");
      if (confirmCheckin) {
        confirmCheckin.addEventListener("click", () => {
          const current = getParticipantById(state.participantCurrentId);
          if (!current) return;
          if (current.status === "checked_in") {
            state.participantStep = "confirmation";
            render();
            return;
          }
          const updatedTime = formatNowTime();
          updateParticipant(current.id, (participant) => ({ ...participant, status: "checked_in", checkedInAt: updatedTime }));
          state.participantMessage = { type: "success", text: `Anwesenheit erfolgreich bestätigt für ${current.name}.` };
          state.participantStep = "confirmation";
          render();
        });
      }

      document.querySelectorAll("[data-forum-id]").forEach((input) => {
        input.addEventListener("change", () => {
          const id = state.participantCurrentId;
          if (!id) return;
          updateParticipant(id, (participant) => ({ ...participant, selectedForumId: input.dataset.forumId }));
          render();
        });
      });

      document.querySelectorAll("[data-program-id]").forEach((input) => {
        input.addEventListener("change", () => {
          const id = state.participantCurrentId;
          const current = getParticipantById(id);
          if (!id || !current) return;
          const programId = input.dataset.programId;
          const exists = current.selectedProgramIds.includes(programId);
          const nextProgramIds = exists
            ? current.selectedProgramIds.filter((item) => item !== programId)
            : [...current.selectedProgramIds, programId];
          if (nextProgramIds.length > 5) {
            state.participantMessage = { type: "warning", text: "Es können maximal 5 Programmpunkte ausgewählt werden." };
            render();
            return;
          }
          state.participantMessage = null;
          updateParticipant(id, (participant) => ({ ...participant, selectedProgramIds: nextProgramIds }));
          render();
        });
      });

      document.querySelectorAll("[data-meal]").forEach((input) => {
        input.addEventListener("change", () => {
          const id = state.participantCurrentId;
          if (!id) return;
          updateParticipant(id, (participant) => ({ ...participant, mealPreference: input.dataset.meal }));
          render();
        });
      });

      const lunchPackage = document.getElementById("lunch-package");
      if (lunchPackage) {
        lunchPackage.addEventListener("change", () => {
          const id = state.participantCurrentId;
          if (!id) return;
          updateParticipant(id, (participant) => ({ ...participant, lunchPackage: lunchPackage.checked }));
          render();
        });
      }

      const saveSelection = document.getElementById("save-selection");
      if (saveSelection) {
        saveSelection.addEventListener("click", () => {
          state.participantMessage = {
            type: "success",
            text: state.participantMode === "pre_event" ? "Ihre Vorabauswahl wurde gespeichert." : "Ihre Auswahl wurde gespeichert.",
          };
          state.participantStep = state.participantMode === "pre_event" ? "pre_event_done" : "confirmation";
          render();
        });
      }

      const backToSelection = document.getElementById("back-to-selection");
      if (backToSelection) {
        backToSelection.addEventListener("click", () => {
          state.participantStep = "selection";
          render();
        });
      }
    }

    render();
  </script>
</body>
</html>
